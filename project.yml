name: HeadphoneBar
options:
  bundleIdPrefix: com.yuri
  deploymentTarget:
    macOS: "11.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.yuri.HeadphoneBar
    MARKETING_VERSION: "1.0.1"
    CURRENT_PROJECT_VERSION: "2"
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "11.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual
    ENABLE_HARDENED_RUNTIME: NO

targets:
  HeadphoneBar:
    type: application
    platform: macOS
    sources:
      - path: HeadphoneBar
        type: group
    settings:
      base:
        INFOPLIST_FILE: HeadphoneBar/Info.plist
        PRODUCT_NAME: HeadphoneBar
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LSUIElement: YES
    entitlements:
      path: HeadphoneBar/HeadphoneBar.entitlements
      properties:
        com.apple.security.device.bluetooth: true
